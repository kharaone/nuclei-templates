id: wordpress-sg-ai-studio

info:
  name: AI Agent by SiteGround Detection
  author: ricardomaia
  severity: info
  reference:
    - https://wordpress.org/plugins/sg-ai-studio/
  metadata:
    plugin_namespace: sg-ai-studio
    wpscan: https://wpscan.com/plugin/sg-ai-studio
  tags: tech,wordpress,wp-plugin,top-100,top-200

requests:
  - method: GET

    path:
      - "{{BaseURL}}/wp-content/plugins/sg-ai-studio/readme.txt"

    payloads:
      last_version: helpers/wordpress/plugins/sg-ai-studio.txt

    extractors:
      - type: regex
        part: body
        internal: true
        name: internal_detected_version
        group: 1
        regex:
          - '(?i)Stable.tag:\s?([\w.]+)'

      - type: regex
        part: body
        name: detected_version
        group: 1
        regex:
          - '(?i)Stable.tag:\s?([\w.]+)'

    matchers-condition: or
    matchers:
      - type: dsl
        name: "outdated_version"
        dsl:
          - compare_versions(internal_detected_version, concat("< ", last_version))

      - type: regex
        part: body
        regex:
          - '(?i)Stable.tag:\s?([\w.]+)'
