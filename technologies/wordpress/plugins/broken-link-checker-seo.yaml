id: wordpress-broken-link-checker-seo

info:
  name: Broken Link Checker by AIOSEO – Find & Fix Broken Internal, External & Video Links Detection
  author: ricardomaia
  severity: info
  reference:
    - https://wordpress.org/plugins/broken-link-checker-seo/
  metadata:
    plugin_namespace: broken-link-checker-seo
    wpscan: https://wpscan.com/plugin/broken-link-checker-seo
  tags: tech,wordpress,wp-plugin,top-200

requests:
  - method: GET

    path:
      - "{{BaseURL}}/wp-content/plugins/broken-link-checker-seo/readme.txt"

    payloads:
      last_version: helpers/wordpress/plugins/broken-link-checker-seo.txt

    extractors:
      - type: regex
        part: body
        internal: true
        name: internal_detected_version
        group: 1
        regex:
          - '(?i)Stable.tag:\s?([\w.]+)'

      - type: regex
        part: body
        name: detected_version
        group: 1
        regex:
          - '(?i)Stable.tag:\s?([\w.]+)'

    matchers-condition: or
    matchers:
      - type: dsl
        name: "outdated_version"
        dsl:
          - compare_versions(internal_detected_version, concat("< ", last_version))

      - type: regex
        part: body
        regex:
          - '(?i)Stable.tag:\s?([\w.]+)'
