id: wordpress-surerank

info:
  name: SureRank SEO – Smart Assistant with Meta Tags, Social Preview, XML Sitemap, and Schema Detection
  author: ricardomaia
  severity: info
  reference:
    - https://wordpress.org/plugins/surerank/
  metadata:
    plugin_namespace: surerank
    wpscan: https://wpscan.com/plugin/surerank
  tags: tech,wordpress,wp-plugin,top-200

requests:
  - method: GET

    path:
      - "{{BaseURL}}/wp-content/plugins/surerank/readme.txt"

    payloads:
      last_version: helpers/wordpress/plugins/surerank.txt

    extractors:
      - type: regex
        part: body
        internal: true
        name: internal_detected_version
        group: 1
        regex:
          - '(?i)Stable.tag:\s?([\w.]+)'

      - type: regex
        part: body
        name: detected_version
        group: 1
        regex:
          - '(?i)Stable.tag:\s?([\w.]+)'

    matchers-condition: or
    matchers:
      - type: dsl
        name: "outdated_version"
        dsl:
          - compare_versions(internal_detected_version, concat("< ", last_version))

      - type: regex
        part: body
        regex:
          - '(?i)Stable.tag:\s?([\w.]+)'
